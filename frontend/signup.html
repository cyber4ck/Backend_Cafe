<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Backend Cafe</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-logo" onclick="window.location.href='index.html'">☕ Backend Cafe</div>
  <div class="nav-links">
    <a href="login.html" class="nav-link">Already a member? Login →</a>
  </div>
</nav>

<div class="auth-page">
  <!-- DOODLE SIDE (left on signup) — OpenDoodles "Jumping" character -->
  <div class="auth-right" style="order:-1; border-left:none; border-right:2.5px solid var(--ink)">
    <svg class="auth-bg-doodle" style="top:8%;right:6%;width:70px" viewBox="0 0 70 70"><circle cx="35" cy="35" r="30" stroke="#D4820A" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/></svg>
    <svg class="auth-bg-doodle" style="bottom:15%;left:6%;width:55px" viewBox="0 0 55 55"><path d="M27 5 L32 18 L46 18 L35 27 L39 41 L27 33 L15 41 L19 27 L8 18 L22 18Z" stroke="#1C1209" stroke-width="2" fill="none"/></svg>

    <div class="auth-right-inner">
      <!-- Jumping / excited doodle person -->
      <svg class="auth-doodle" viewBox="0 0 260 380" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- head -->
        <circle cx="130" cy="70" r="38" fill="#F5EDD6" stroke="#1C1209" stroke-width="3"/>
        <!-- excited face -->
        <circle cx="118" cy="64" r="5" fill="#1C1209"/>
        <circle cx="142" cy="64" r="5" fill="#1C1209"/>
        <!-- wide excited smile -->
        <path d="M113 82 Q130 96 147 82" stroke="#1C1209" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M113 82 Q115 90 130 92 Q145 90 147 82" fill="#D4820A" opacity=".2"/>
        <!-- raised eyebrows excited -->
        <path d="M112 56 Q118 51 124 56" stroke="#1C1209" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M136 56 Q142 51 148 56" stroke="#1C1209" stroke-width="2" stroke-linecap="round" fill="none"/>
        <!-- hair -->
        <path d="M94 58 Q98 32 130 30 Q162 30 167 56" stroke="#1C1209" stroke-width="3" fill="#1C1209"/>
        <!-- wild hair bits (excited) -->
        <path d="M96 42 Q88 30 92 22" stroke="#1C1209" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M120 32 Q118 20 124 14" stroke="#1C1209" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <path d="M155 40 Q163 28 168 22" stroke="#1C1209" stroke-width="2.5" stroke-linecap="round" fill="none"/>

        <!-- body jumping / arms up -->
        <path d="M115 108 Q96 128 92 168 Q90 195 105 225" stroke="#1C1209" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M145 108 Q164 128 168 168 Q170 195 155 225" stroke="#1C1209" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M95 148 Q130 162 165 148" fill="#F5EDD6" stroke="#1C1209" stroke-width="2.5"/>

        <!-- arms raised up excited -->
        <path d="M96 130 Q70 110 54 88" stroke="#1C1209" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <circle cx="50" cy="84" r="11" fill="#F5EDD6" stroke="#1C1209" stroke-width="2.5"/>
        <path d="M164 130 Q190 110 206 88" stroke="#1C1209" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <circle cx="210" cy="84" r="11" fill="#F5EDD6" stroke="#1C1209" stroke-width="2.5"/>

        <!-- legs mid-jump / bent -->
        <path d="M105 225 Q94 265 88 300 Q84 320 100 330" stroke="#1C1209" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <path d="M155 225 Q166 265 172 300 Q176 320 160 330" stroke="#1C1209" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        <!-- shoes -->
        <path d="M92 330 Q80 340 102 343 Q114 345 116 337 L100 330 Z" fill="#1C1209"/>
        <path d="M152 330 Q140 340 162 343 Q174 345 176 337 L160 330 Z" fill="#1C1209"/>

        <!-- exclamation stars around -->
        <text x="14" y="140" font-size="22" fill="#D4820A">★</text>
        <text x="220" y="140" font-size="18" fill="#D4820A">✦</text>
        <text x="50" y="260" font-size="16" fill="#D4820A">♥</text>
        <text x="200" y="270" font-size="20" fill="#1C1209" opacity=".3">!</text>
      </svg>

      <div class="auth-code-card">
        <div class="auth-code-title">// creating account</div>
        <div class="code-line"><span class="code-kw">POST</span> <span class="code-str">/api/auth/signup</span></div>
        <div class="code-line"><span class="code-cmt">// setting up your profile...</span></div>
        <div class="code-line"><span class="code-kw">201</span> <span class="code-str">welcome aboard! ✓</span></div>
        <div class="code-line"><span class="code-cmt">// first coffee incoming 🚀</span></div>
      </div>
    </div>
  </div>

  <!-- FORM -->
  <div class="auth-left">
    <div class="auth-form-wrap">
      <div class="section-tag">New here?</div>
      <h1 class="auth-title">Create account ✨</h1>
      <p class="auth-sub">Join thousands of developers fuelled by Backend Cafe.</p>

      <form id="signupForm">
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="name">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min. 6 characters" required autocomplete="new-password">
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" required autocomplete="new-password">
        </div>
        <div class="auth-submit">
          <button type="submit" class="btn btn-fill btn-lg btn-full">Create account →</button>
        </div>
      </form>

      <div class="auth-divider">or</div>
      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
      <div id="message"></div>
    </div>
  </div>
</div>

<script src="js/signup.js"></script>
</body>
</html>
