<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Backend Cafe</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-logo" onclick="window.location.href='index.html'">☕ Backend Cafe</div>
  <div class="nav-links">
    <a href="menu.html" class="nav-link">← Menu</a>
    <a href="orders.html" class="nav-link">My Orders</a>
    <a href="#" class="nav-link danger" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="admin-page">
  <div class="admin-header">
    <div class="section-tag">Admin Only</div>
    <h1 class="hero-title" style="font-size:2rem">Admin Panel ☕</h1>
    <div class="admin-tabs" id="adminTabs" style="display:none">
      <button class="admin-tab active" id="tabMenuBtn" onclick="switchTab('menu')">Menu Items</button>
      <button class="admin-tab" id="tabUsersBtn" onclick="switchTab('users')">Users &amp; Orders</button>
    </div>
  </div>

  <div id="adminContent" class="admin-inner">
    <p class="loading">Checking access...</p>
  </div>
</div>

<script src="js/admin.js"></script>

</html>
